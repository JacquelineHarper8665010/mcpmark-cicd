name: Issue Management Automation

on:
  issues:
    types: [opened, labeled]

jobs:
  issue-triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Triage issue and manage labels
        uses: actions/github-script@v7
        with:
          script: |
            // Define all required labels
            const requiredLabels = [
              // Category Labels
              { name: 'bug', description: 'Something isn\'t working' },
              { name: 'enhancement', description: 'New feature or request' },
              { name: 'epic', description: 'Large feature requiring multiple sub-tasks' },
              { name: 'maintenance', description: 'Maintenance and housekeeping tasks' },
              // Priority Labels
              { name: 'priority-critical', description: 'Critical priority issue' },
              { name: 'priority-high', description: 'High priority issue' },
              { name: 'priority-medium', description: 'Medium priority issue' },
              { name: 'priority-low', description: 'Low priority issue' },
              // Status Labels
              { name: 'needs-triage', description: 'Needs to be reviewed by maintainers' },
              { name: 'needs-review', description: 'Awaiting review from maintainers' },
              { name: 'first-time-contributor', description: 'Issue created by first-time contributor' }
            ];

            // Create missing labels
            for (const label of requiredLabels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name
                });
              } catch (err) {
                if (err.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    description: label.description,
                    color: label.name.includes('priority') ? 'e11d21' : 
                          label.name.includes('bug') ? 'd73a4a' :
                          label.name.includes('enhancement') ? 'a2eeef' :
                          label.name.includes('epic') ? '0052cc' :
                          label.name.includes('maintenance') ? 'f9d0c4' :
                          label.name.includes('needs-') ? 'fbca04' :
                          '1d76db'
                  });
                }
              }
            }

            // Get issue data
            const issue = context.payload.issue;
            const issueTitle = issue.title.toLowerCase();
            const issueBody = (issue.body || '').toLowerCase();

            // Add initial needs-triage label if not present
            const currentLabels = issue.labels.map(l => l.name);
            if (!currentLabels.includes('needs-triage')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['needs-triage']
              });
            }

            // Assign category label based on title
            let categoryLabel = null;
            if (issueTitle.includes('bug')) {
              categoryLabel = 'bug';
            } else if (issueTitle.includes('epic')) {
              categoryLabel = 'epic';
            } else if (issueTitle.includes('maintenance')) {
              categoryLabel = 'maintenance';
            }

            if (categoryLabel && !currentLabels.includes(categoryLabel)) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: [categoryLabel]
              });
            }

            // Assign priority label (highest priority first)
            const priorityKeywords = [
              { keywords: ['critical', 'urgent', 'production', 'outage'], label: 'priority-critical' },
              { keywords: ['important', 'high', 'blocking'], label: 'priority-high' },
              { keywords: ['low', 'nice-to-have', 'minor'], label: 'priority-low' },
              { keywords: ['medium', 'normal'], label: 'priority-medium' }
            ];

            let priorityLabel = 'priority-medium'; // default
            for (const { keywords, label } of priorityKeywords) {
              const hasKeyword = keywords.some(k => issueTitle.includes(k) || issueBody.includes(k));
              if (hasKeyword) {
                priorityLabel = label;
                break;
              }
            }

            if (!currentLabels.includes(priorityLabel)) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: [priorityLabel]
              });
            }

  task-breakdown:
    runs-on: ubuntu-latest
    needs: issue-triage
    if: contains(github.event.issue.labels.*.name, 'epic')
    permissions:
      issues: write
      contents: read
    steps:
      - name: Create epic subtasks
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const parentNumber = issue.number;
            const parentTitle = issue.title;
            const subtasks = [
              { name: 'Requirements Analysis' },
              { name: 'Design and Architecture' },
              { name: 'Implementation' },
              { name: 'Testing and Documentation' }
            ];

            // Create subtasks and collect their numbers
            const subtaskNumbers = [];
            for (let i = 0; i < subtasks.length; i++) {
              const task = subtasks[i];
              const subtaskTitle = `[SUBTASK] ${parentTitle} - Task ${i+1}: ${task.name}`;
              const subtaskBody = `Related to #${parentNumber}`;

              const subtask = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: subtaskTitle,
                body: subtaskBody,
                labels: ['enhancement', 'needs-review']
              });

              subtaskNumbers.push(subtask.data.number);
            }

            // Update parent issue with checklist
            const checklist = subtaskNumbers.map(num => `- [ ] #${num}`).join('\n');
            const newBody = (issue.body || '') + `\n\n## Epic Tasks\n${checklist}`;

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parentNumber,
              body: newBody
            });

  auto-response:
    runs-on: ubuntu-latest
    needs: issue-triage
    permissions:
      issues: write
      contents: read
    steps:
      - name: Check if first issue for author
        uses: actions/github-script@v7
        id: first-issue
        with:
          script: |
            const issue = context.payload.issue;
            const author = issue.user.login;

            // Get all issues by this author in the repo
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator: author,
              state: 'all'
            });

            // Return true if this is their first issue (count <=1)
            return issues.data.length <= 1;

      - name: Add first-time label and respond
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const isFirstIssue = ${{ steps.first-issue.outputs.result }};
            const currentLabels = issue.labels.map(l => l.name);

            // Add first-time-contributor label if needed
            if (isFirstIssue && !currentLabels.includes('first-time-contributor')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['first-time-contributor']
              });
            }

            // Determine response based on labels
            let response = '';
            const hasBug = currentLabels.includes('bug');
            const hasEpic = currentLabels.includes('epic');
            const hasMaintenance = currentLabels.includes('maintenance');

            // Welcome message for first time
            if (isFirstIssue) {
              response += "👋 Welcome! This is your first issue in this repository. We appreciate your contribution!\n\n";
            }

            // Add type-specific guidelines
            if (hasBug) {
              response += "### Bug Report Guidelines\nPlease ensure you've provided all necessary details (steps to reproduce, environment, etc.) to help us resolve this bug quickly.\n";
            } else if (hasEpic) {
              response += "### Feature Request Process\nThis epic has been broken down into subtasks. You can track progress in the checklist below.\n";
            } else if (hasMaintenance) {
              response += "### Maintenance Guidelines\nPlease provide details on the impact and proposed actions for this maintenance task.\n";
            }

            // Post comment if response exists
            if (response) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: response
              });
            }

            // Set milestone for high/critical priority
            if (currentLabels.includes('priority-high') || currentLabels.includes('priority-critical')) {
              // Find or create milestone v1.0.0
              let milestone = null;
              const milestones = await github.rest.issues.listMilestones({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'all'
              });
              milestone = milestones.data.find(m => m.title === 'v1.0.0');

              if (!milestone) {
                milestone = await github.rest.issues.createMilestone({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: 'v1.0.0',
                  description: 'Initial release milestone'
                });
                milestone = milestone.data;
              }

              if (milestone && issue.milestone !== milestone.number) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  milestone: milestone.number
                });
              }
            }

            // Update status from needs-triage to needs-review
            if (currentLabels.includes('needs-triage')) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                name: 'needs-triage'
              });

              if (!currentLabels.includes('needs-review')) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: ['needs-review']
                });
              }
            }